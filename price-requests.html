<!DOCTYPE html>
<html lang="it">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <base href="/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Richieste prezzo</title>
  <link rel="stylesheet" href="./styles.css?v=final_20260318">
  <link rel="stylesheet" href="./mobile.css?v=final_20260318">
  <style>
    .wrap-price{max-width:1100px;margin:0 auto;padding:16px}
    .price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
    .price-kpi,.request-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:18px;box-shadow:0 16px 32px rgba(0,0,0,.18)}
    .price-kpi{padding:14px}
    .price-kpi h3{margin:0 0 8px;font-size:14px;opacity:.88}
    .price-kpi strong{font-size:28px}
    .toolbar-requests{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 14px}
    .toolbar-requests input,.toolbar-requests select{padding:11px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff}
    .request-list{display:grid;grid-template-columns:1fr;gap:12px}
    .request-card{padding:16px}
    .request-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .request-title{font-size:22px;font-weight:900}
    .request-meta{font-size:13px;opacity:.82;line-height:1.5}
    .status-pill{display:inline-flex;align-items:center;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;text-transform:uppercase}
    .status-pending{background:#fff3c4;color:#7c5a00}.status-quoted{background:#d9eeff;color:#13528a}.status-completed{background:#daf2d0;color:#286426}
    .request-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .request-actions button{border:none;border-radius:12px;padding:10px 12px;font-weight:800;cursor:pointer}
    .btn-pending{background:#fff3c4;color:#7c5a00}.btn-quoted{background:#d9eeff;color:#13528a}.btn-completed{background:#daf2d0;color:#286426}
    .empty{padding:22px;text-align:center;opacity:.8}
    @media(max-width:820px){.price-grid{grid-template-columns:1fr}.request-head{flex-direction:column}.request-title{font-size:20px}}
  </style>
</head>
<body>
<header class="top-bar">
  <button class="back-btn" onclick="window.location.href='index.html'">←</button>
  <span class="page-title">Richieste prezzo</span>
  <select id="quickNav" class="quick-nav"><option value="">Vai a…</option><option value="index.html">HOME</option><option value="clients.html">CLIENTI</option><option value="listini.html">LISTINI</option><option value="ordini-clienti.html">PREVENTIVI</option><option value="price-requests.html">RICHIESTE PREZZO</option><option value="incassi.html">INCASSI</option></select>
</header>
<main class="wrap-price">
  <section class="price-grid">
    <div class="price-kpi"><h3>Totali</h3><strong id="kpiTotal">0</strong></div>
    <div class="price-kpi"><h3>In attesa</h3><strong id="kpiPending">0</strong></div>
    <div class="price-kpi"><h3>Quotate / chiuse</h3><strong id="kpiDone">0</strong></div>
  </section>
  <div class="toolbar-requests">
    <input id="searchInput" type="text" placeholder="Cerca cliente o prodotto">
    <select id="statusFilter"><option value="all">Tutti gli stati</option><option value="pending">In attesa</option><option value="quoted">Quotate</option><option value="completed">Chiuse</option></select>
  </div>
  <section id="requestList" class="request-list"></section>
</main>
<script type="module" src="./price-requests.js?v=final_20260318"></script>
<script type="module" src="/nav.js?v=final_20260318"></script>
</body>
</html>
