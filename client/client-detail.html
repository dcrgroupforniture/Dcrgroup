<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheda Cliente</title>

  <link rel="stylesheet" href="client-detail.css">
  <script type="module" src="client-detail.js" defer></script>
</head>

<body>

<header class="header">
  <button class="back-btn" onclick="window.location.href='clients.html'">←</button>
  <h1 id="clientName">Cliente</h1>
</header>

<main class="container">

  <!-- ANAGRAFICA -->
  <section class="card">
    <h2>Anagrafica</h2>

    <div class="field"><strong>Nome:</strong> <span id="firstName">-</span></div>
    <div class="field"><strong>Cognome:</strong> <span id="lastName">-</span></div>
    <div class="field"><strong>Data di nascita:</strong> <span id="birthDate">-</span></div>
    <div class="field"><strong>Comune:</strong> <span id="city">-</span></div>
    <div class="field"><strong>Partita IVA:</strong> <span id="vatNumber">-</span></div>
    <div class="field"><strong>Email:</strong> <span id="email">-</span></div>
    <div class="field"><strong>Telefono:</strong> <span id="phone">-</span></div>

    <button id="addOrderBtn" class="primary-btn">
      ➕ Aggiungi ordine
    </button>
  </section>

  <!-- ORDINI -->
  <section class="card">
    <h2>Storico Ordini</h2>
    <ul id="ordersList"></ul>
  </section>

</main>

</body>
</html>
