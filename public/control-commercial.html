<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Controllo Commerciale</title><link rel="stylesheet" href="styles.css"><style>body{background:#081a61;color:#fff}.wrap{max-width:430px;margin:0 auto;padding:18px 16px 120px}.panel{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:24px;padding:18px;margin-bottom:14px}.panel h2{margin:0 0 12px}.field{margin:10px 0}.chip{background:#eef2ff;color:#1733a9;border:none;border-radius:14px;padding:10px 14px;font-weight:800}.sel{width:100%;padding:12px;border-radius:14px;border:none}.small{opacity:.78}.cta{display:block;width:100%;padding:14px;border:none;border-radius:16px;background:#2fd45f;color:#04220b;font-weight:900;margin-top:10px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}</style></head><body><div class="wrap"><div class="panel"><a href="index.html" class="chip" style="text-decoration:none;display:inline-block">← Dashboard</a><h1 style="margin:14px 0 8px">Controllo Commerciale</h1><div class="small">Configura i prodotti della home del portale in modo operativo.</div></div><div class="panel"><h2>Offerta della settimana</h2><div class="row"><div class="field"><label>Prodotto 1</label><select id="weekly1" class="sel"></select></div><div class="field"><label>Prodotto 2</label><select id="weekly2" class="sel"></select></div></div></div><div class="panel"><h2>Last minute</h2><div class="row"><div class="field"><label>Prodotto 1</label><select id="last1" class="sel"></select></div><div class="field"><label>Prodotto 2</label><select id="last2" class="sel"></select></div></div></div><div class="panel"><h2>Prodotti più venduti</h2><div class="field"><label>Best seller mostrati</label><select id="best" class="sel" multiple size="8"></select><div class="small">Seleziona quelli da mostrare nello slider.</div></div></div><button id="save-all" class="cta">Salva configurazione</button></div><script type="module">import {db,collection,getDocs,doc,setDoc,getDoc} from './firebase.js'; import { firestoreService as fs } from './services/firestoreService.js'; const products=(await fs.getAllByCompany('products')); const settingsSnap=await getDoc(doc(db,'settings','commercial')); const settings=settingsSnap.exists()?settingsSnap.data():{}; const fill=(el,multi=false)=>{el.innerHTML='<option value="">-- seleziona --</option>'; products.forEach(p=>{const o=document.createElement('option'); o.value=p.id; o.textContent=`${p.brand||''} · ${p.name||p.title||p.id}`; el.appendChild(o);}); if(multi) el.innerHTML='';}; fill(weekly1); fill(weekly2); fill(last1); fill(last2); fill(best,true); products.forEach(p=>{const o=document.createElement('option'); o.value=p.id; o.textContent=`${p.brand||''} · ${p.name||p.title||p.id}`; best.appendChild(o);}); (settings.weekly||[]).forEach((id,idx)=>{const el=document.getElementById(`weekly${idx+1}`); if(el) el.value=id;}); (settings.lastMinute||[]).forEach((id,idx)=>{const el=document.getElementById(`last${idx+1}`); if(el) el.value=id;}); [...best.options].forEach(o=>{o.selected=(settings.bestsellers||[]).includes(o.value);}); document.getElementById('save-all').onclick=async()=>{const payload={weekly:[weekly1.value,weekly2.value].filter(Boolean),lastMinute:[last1.value,last2.value].filter(Boolean),bestsellers:[...best.selectedOptions].map(o=>o.value),updatedAt:new Date().toISOString()}; await setDoc(doc(db,'settings','commercial'),payload,{merge:true}); alert('Configurazione salvata');}; </script></body></html>
