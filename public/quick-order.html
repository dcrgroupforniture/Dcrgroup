<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Ordine veloce agente</title><link rel="stylesheet" href="styles.css"><style>body{background:#eff2f7;color:#162352}.wrap{max-width:430px;margin:0 auto;padding:18px 16px 120px}.card{background:#fff;border-radius:24px;padding:18px;box-shadow:0 10px 28px rgba(13,24,72,.08);margin-bottom:14px}.sel,.search{width:100%;padding:14px;border-radius:16px;border:1px solid #d7dff3}.list{display:grid;gap:10px;margin-top:12px}.item{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:8px;align-items:center;background:#f5f7fc;padding:10px 12px;border-radius:16px}.qty{width:56px;padding:10px;border-radius:12px;border:1px solid #cfd9ef;text-align:center}.cta{padding:14px 16px;border:none;border-radius:16px;background:#2457e0;color:#fff;font-weight:900}.small{color:#7280a6}.btn-lite{padding:10px 12px;border:none;border-radius:14px;background:#e8edf9;color:#2040a8;font-weight:800}</style></head><body><div class="wrap"><div class="card"><a href="index.html" style="text-decoration:none" class="small">← Dashboard</a><h1 style="margin:10px 0 8px">Ordine veloce agente</h1><div class="small">Crea un ordine cliente usando clienti e prodotti reali.</div></div><div class="card"><label>Cliente</label><select id="clientSel" class="sel"></select><div style="height:12px"></div><label>Cerca prodotto</label><input id="search" class="search" placeholder="Nome, linea, marchio"><div id="products" class="list"></div></div><div class="card"><h2 style="margin:0 0 10px">Carrello rapido</h2><div id="cartList" class="list"></div><button id="submit" class="cta">Invia ordine</button></div></div><script type="module">import {db,collection,getDocs,serverTimestamp} from './firebase.js'; import { firestoreService as fs } from './services/firestoreService.js'; const clientSel=document.getElementById('clientSel'); const search=document.getElementById('search'); const productsEl=document.getElementById('products'); const cartList=document.getElementById('cartList'); const submit=document.getElementById('submit'); const clients=(await fs.getAllByCompany('clients')); const products=(await getDocs(collection(db,'products'))).docs.map(d=>({id:d.id,...d.data()})).filter(p=>Number(p.price||p.listPrice||0)>0); clientSel.innerHTML=clients.map(c=>`<option value="${c.id}">${c.name||c.nome||c.businessName||c.email||c.id}</option>`).join(''); const cart=[]; function drawProducts(){const q=(search.value||'').toLowerCase(); productsEl.innerHTML=''; products.filter(p=>!q||`${p.name||''} ${p.line||''} ${p.brand||''}`.toLowerCase().includes(q)).slice(0,24).forEach(p=>{const row=document.createElement('div'); row.className='item'; row.innerHTML=`<div><strong>${p.brand||''} ${p.name||''}</strong><div class="small">${p.line||''}</div></div><div>${Number(p.price||p.listPrice||0).toFixed(2)}€</div><button class="cta" style="padding:10px 12px">Aggiungi</button>`; row.querySelector('button').onclick=()=>{const ex=cart.find(i=>i.id===p.id); if(ex) ex.qty+=1; else cart.push({id:p.id,name:p.name||'',brand:p.brand||'',line:p.line||'',price:Number(p.price||p.listPrice||0),qty:1}); drawCart();}; productsEl.appendChild(row);});} function drawCart(){cartList.innerHTML=''; if(!cart.length){cartList.innerHTML='<div class="small">Nessun prodotto selezionato.</div>'; return;} cart.forEach(i=>{const row=document.createElement('div'); row.className='item'; row.innerHTML=`<div><strong>${i.brand||''} ${i.name}</strong><div class="small">Totale ${(i.price*i.qty).toFixed(2)}€</div></div><input class="qty" type="number" min="1" value="${i.qty}"><button class="btn-lite">Rimuovi</button>`; row.querySelector('input').onchange=e=>{i.qty=Math.max(1,Number(e.target.value||1)); drawCart();}; row.querySelector('button').onclick=()=>{const idx=cart.indexOf(i); if(idx>-1) cart.splice(idx,1); drawCart();}; cartList.appendChild(row);});} search.addEventListener('input',drawProducts); drawProducts(); drawCart(); submit.onclick=async()=>{if(!cart.length){alert('Carrello vuoto'); return;} const c=clients.find(x=>x.id===clientSel.value)||{}; const total=cart.reduce((s,i)=>s+i.price*i.qty,0); await fs.add('orders',{clientId:c.id||'',clientName:c.name||c.nome||c.businessName||'',clientEmail:c.email||'',items:cart,total,itemsCount:cart.length,createdAtISO:new Date().toISOString(),createdBy:'agent',source:'agent',status:'pending'}); alert('Ordine creato correttamente'); cart.length=0; drawCart();}; </script></body></html>
