<!doctype html>
<html lang="it">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
  <base href="/">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Note Ordini – DCR Group</title>
  <link rel="stylesheet" href="styles.css?v=20260420" />
  <link rel="stylesheet" href="mobile.css?v=20260420" />
  <link rel="stylesheet" href="ordini-appunti.css?v=oa_v2" />
  <script type="module" src="/auth-guard.js"></script>
</head>
<body class="oa-page">

  <!-- Top bar -->
  <header class="oa-topbar">
    <a class="oa-back" href="index.html" aria-label="Indietro">←</a>
    <div class="oa-topbar-title">
      <span class="oa-topbar-icon">🗒️</span>
      <span>Note Ordini</span>
    </div>
    <select id="quickNav" class="quick-nav">
      <option value="">Vai a…</option>
      <option value="index.html">HOME</option>
      <option value="clients.html">CLIENTI</option>
      <option value="suppliers.html">FORNITORI</option>
      <option value="scadenze.html">SCADENZE</option>
      <option value="incassi.html">INCASSI</option>
      <option value="spese.html">SPESE</option>
      <option value="listini.html">LISTINI</option>
      <option value="statistiche.html">STATISTICHE</option>
      <option value="agenda.html">AGENDA</option>
      <option value="ordini-clienti.html">ORDINI CLIENTI</option>
      <option value="ordini-appunti.html" selected>NOTE ORDINI</option>
    </select>
  </header>

  <main class="oa-main">

    <!-- KPI strip -->
    <section class="oa-kpi-strip">
      <div class="oa-kpi">
        <div class="oa-kpi-val" id="kpiTotalNotes">0</div>
        <div class="oa-kpi-label">Note salvate</div>
      </div>
      <div class="oa-kpi">
        <div class="oa-kpi-val" id="kpiTodayNotes">0</div>
        <div class="oa-kpi-label">Oggi</div>
      </div>
      <div class="oa-kpi">
        <div class="oa-kpi-val" id="kpiWeekNotes">0</div>
        <div class="oa-kpi-label">Questa settimana</div>
      </div>
      <div class="oa-kpi">
        <div class="oa-kpi-val" id="kpiSelectedNotes">0</div>
        <div class="oa-kpi-label">Selezionate</div>
      </div>
    </section>

    <!-- Editor + actions layout -->
    <div class="oa-layout">

      <!-- Editor panel -->
      <section class="oa-editor-panel">
        <div class="oa-panel-head">
          <span class="oa-panel-title">✏️ Nuova nota</span>
          <span class="oa-status" id="oaStatus"></span>
        </div>
        <textarea
          id="workNotes"
          class="oa-textarea"
          placeholder="Es: Mario Rossi — 5 shampoo — consegna venerdì&#10;Cliente X — richiamo martedì&#10;…"
          rows="8"
          spellcheck="true"
          autocapitalize="sentences"
        ></textarea>
        <div class="oa-editor-actions">
          <button id="saveBtn" class="oa-btn oa-btn-primary">
            <span>💾</span> Salva nota
          </button>
          <button id="clearBtn" class="oa-btn oa-btn-ghost">
            🗑 Svuota
          </button>
        </div>
      </section>

      <!-- History panel -->
      <section class="oa-history-panel">
        <div class="oa-panel-head">
          <span class="oa-panel-title">📋 Storico note</span>
          <div class="oa-hist-actions">
            <input type="search" id="oaSearch" class="oa-search" placeholder="🔍 Cerca…" autocomplete="off" />
            <button id="selectAllNotesBtn" class="oa-btn oa-btn-sm oa-btn-outline">Tutte</button>
            <button id="clearSelectedNotesBtn" class="oa-btn oa-btn-sm oa-btn-outline">Deseleziona</button>
            <button id="printSelectedNotesBtn" class="oa-btn oa-btn-sm oa-btn-primary">🖨 Stampa</button>
          </div>
        </div>
        <div id="notesHistory" class="oa-notes-list">
          <div class="oa-loading">⏳ Caricamento…</div>
        </div>
      </section>

    </div><!-- /.oa-layout -->

  </main>

  <script type="module" src="/nav.js?v=20260420"></script>
  <script type="module" src="ordini-appunti.js?v=oa_v2"></script>
  <script src="scripts/dashboard-menu.js?v=20260420"></script>
</body>
</html>
